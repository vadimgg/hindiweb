/**
 * Render a full word card article element.
 * @param {object} word - word object from demoWord
 * @returns {string} HTML string
 */
window.WordCard = function (word) {
  const formsHtml = (word.forms || []).map(f => `
    <div class="wc-form-chip">
      <span class="wc-form-chip-label">${f.label}</span>
      <span class="wc-form-chip-hindi" lang="hi">${f.hindi}</span>
      <span class="wc-form-chip-roman">${f.roman}</span>
    </div>
  `).join('');

  const usageHtml = (word.usage_notes || []).map(n => `
    <p class="wc-usage-note">${n}</p>
  `).join('');

  const relatedHtml = (word.related_words || []).map(r => `
    <div class="wc-related-chip">
      <span class="wc-related-hindi" lang="hi">${r.hindi}</span>
      <span class="wc-related-roman">${r.roman}</span>
      <span class="wc-related-english">${r.english}</span>
    </div>
  `).join('');

  const soundalikesHtml = (word.sound_alikes || []).map(s => `
    <div class="wc-soundalike">
      <div class="wc-soundalike-top">
        <span class="wc-soundalike-hindi" lang="hi">${s.hindi}</span>
        <span class="wc-soundalike-via">via ${s.language}</span>
      </div>
      <p class="wc-soundalike-assoc">${s.association}</p>
    </div>
  `).join('');

  const collocsHtml = (word.collocations || []).map(c => `
    <div class="wc-colloc-row">
      <div class="wc-colloc-left">
        <span class="wc-colloc-hindi" lang="hi">${c.hindi}</span>
        <span class="wc-colloc-roman">${c.roman}</span>
      </div>
      <span class="wc-colloc-english">${c.english}</span>
    </div>
  `).join('');

  const etymHtml = (word.etymology || []).map(e => `
    <div class="wc-etym-stage">
      <div class="wc-etym-label-col">
        <span class="wc-etym-stage-label">${e.label}</span>
      </div>
      <div class="wc-etym-content">
        <span class="wc-etym-hindi" lang="hi">${e.hindi}</span>
        <span class="wc-etym-roman">${e.roman}</span>
        ${e.meaning ? `<span class="wc-etym-meaning">— ${e.meaning}</span>` : ''}
      </div>
    </div>
  `).join('');

  const genderBadgeClass = word.gender === 'masculine' ? 'badge badge-masc' : 'badge badge-noun';
  const genderLabel = word.gender === 'masculine' ? 'masc.' : word.gender;

  return `
<article class="wc-card">
  <!-- Header — click to collapse/expand body -->
  <div class="wc-header card-header" role="button" aria-expanded="true">
    <div class="wc-header-content">
      <span class="wc-hindi" lang="hi">${word.hindi}</span>
      <span class="wc-roman">${word.roman}</span>
      <span class="wc-syllables">${word.syllables}</span>
      <div class="wc-grammar-row">
        <span class="badge badge-noun">${word.pos}</span>
        ${word.gender ? `<span class="${genderBadgeClass}">${genderLabel}</span>` : ''}
      </div>
    </div>
    <span class="wc-collapse-icon">▾</span>
  </div>

  <!-- Collapsible body -->
  <div class="wc-body">

    <!-- Forms -->
    <details class="wc-section" open>
      <summary>
        <span class="wc-section-label">Forms</span>
        <span class="wc-section-chevron">▾</span>
      </summary>
      <div class="wc-section-body">
        <div class="wc-forms-row">${formsHtml}</div>
      </div>
    </details>

    <!-- Usage Notes — open by default -->
    <details class="wc-section" open>
      <summary>
        <span class="wc-section-label">Usage Notes</span>
        <span class="wc-section-chevron">▾</span>
      </summary>
      <div class="wc-section-body">
        <div class="wc-usage-list">${usageHtml}</div>
      </div>
    </details>

    <!-- Related Words -->
    <details class="wc-section" open>
      <summary>
        <span class="wc-section-label">Related Words</span>
        <span class="wc-section-chevron">▾</span>
      </summary>
      <div class="wc-section-body">
        <div class="wc-related-list">${relatedHtml}</div>
      </div>
    </details>

    <!-- Sound Alikes -->
    <details class="wc-section" open>
      <summary>
        <span class="wc-section-label">Sound Alikes</span>
        <span class="wc-section-chevron">▾</span>
      </summary>
      <div class="wc-section-body">${soundalikesHtml}</div>
    </details>

    <!-- Collocations -->
    <details class="wc-section" open>
      <summary>
        <span class="wc-section-label">Collocations</span>
        <span class="wc-section-chevron">▾</span>
      </summary>
      <div class="wc-section-body">
        <div class="wc-colloc-list">${collocsHtml}</div>
      </div>
    </details>

    <!-- Etymology -->
    <details class="wc-section" open>
      <summary>
        <span class="wc-section-label">Etymology</span>
        <span class="wc-section-chevron">▾</span>
      </summary>
      <div class="wc-section-body">
        <div class="wc-etym-chain">${etymHtml}</div>
        ${word.origin_note ? `<p class="wc-origin-note">${word.origin_note}</p>` : ''}
      </div>
    </details>

  </div>
</article>
  `.trim();
};

</script>

/**
 * Render a sentence card article element.
 * @param {object} sentence - sentence object from demoSentence
 * @returns {string} HTML string
 */
window.SentenceCard = function (sentence) {
  const rowsHtml = (sentence.words || []).map(w => {
    const genderBadge = w.gender
      ? `<span class="sc-gender-badge">${w.gender === 'm' ? 'masc.' : 'fem.'}</span>`
      : '';
    return `
      <div class="sc-row">
        <div>
          <span class="sc-token-hindi" lang="hi">${w.hindi}</span>
          <span class="sc-token-roman">${w.roman}</span>
        </div>
        <div class="sc-meaning-cell">
          <span class="sc-meaning-text">${w.meaning}</span>
          ${genderBadge}
        </div>
      </div>
    `;
  }).join('');

  return `
<article class="sc-card">
  <!-- Header — click to collapse/expand -->
  <div class="sc-header card-header" role="button" aria-expanded="true">
    <div class="sc-header-content">
      <span class="sc-hindi" lang="hi">${sentence.hindi}</span>
      <span class="sc-roman">${sentence.roman}</span>
      <span class="sc-english">${sentence.english}</span>
      <div class="sc-register-row">
        <span class="badge badge-standard">${sentence.register}</span>
      </div>
    </div>
    <span class="sc-collapse-icon">▾</span>
  </div>

  <!-- Collapsible body -->
  <div class="sc-body">
    <!-- Literal gloss -->
    <p class="sc-gloss">Literal: "${sentence.literal}"</p>

    <!-- Word breakdown -->
    <div class="sc-breakdown">
      <div class="sc-breakdown-header">
        <span class="sc-col-label">Token</span>
        <span class="sc-col-label">Meaning</span>
      </div>
      ${rowsHtml}
    </div>
  </div>
</article>
  `.trim();
};

/**
 * Render the Anki card demo — front + back panels side by side.
 * @param {object} word - word object from demoWord
 * @returns {string} HTML string
 */
window.AnkiCard = function (word) {
  // ── Front panel ──────────────────────────────────────────
  const frontHtml = `
    <div class="anki-shell">
      <div class="card">
        <div class="card-wrap front-face">
          <p class="meaning">${word.english}</p>
          <div class="chips">
            <span class="badge-neutral-anki">${word.pos}</span>
          </div>
        </div>
      </div>
    </div>
  `;

  // ── Back panel ───────────────────────────────────────────
  const usageNotesHtml = (word.usage_notes || []).map(n => `
    <div class="ex-card">
      <p class="item-note">${n}</p>
    </div>
  `).join('');

  const relatedHtml = (word.related_words || []).map(r => `
    <div class="clang-item">
      <div class="word-row">
        <span class="word-text" lang="hi">${r.hindi}</span>
        <span class="word-rom">${r.roman}</span>
      </div>
      <div class="mean-box"><span>${r.english}</span></div>
    </div>
  `).join('');

  const soundAlikesHtml = (word.sound_alikes || []).map(s => `
    <div class="clang-item">
      <span class="lang-label" style="color:#7dd3fc;">${s.language}</span>
      <div class="word-row">
        <span class="word-text" lang="hi">${s.hindi}</span>
      </div>
      <p class="item-note">${s.association}</p>
    </div>
  `).join('');

  const collocHtml = (word.collocations || []).map(c => `
    <div class="coll-row">
      <div>
        <div class="coll-hindi" lang="hi">${c.hindi}</div>
        <div class="coll-rom">${c.roman}</div>
      </div>
      <div class="coll-eng">${c.english}</div>
    </div>
  `).join('');

  const etymHtml = (word.etymology || []).map(e => `
    <div class="etym-stage">
      <span class="etym-lang">${e.label}</span>
      <span class="etym-word" lang="hi">${e.hindi}</span>
      <span class="etym-rom">${e.roman}</span>
    </div>
  `).join('');

  const backHtml = `
    <div class="anki-shell" style="overflow-y: auto; max-height: 600px;">
      <div class="card">
        <div class="card-wrap">
          <div class="answer-header">
            <p class="hindi" lang="hi">${word.hindi}</p>
            <p class="roman">${word.roman}</p>
            <p class="syl-inline">${word.syllables}</p>
            <p class="meaning-reveal">${word.english}</p>
            <div class="header-chips">
              <span class="badge-neutral-anki">${word.pos}</span>
              <span class="badge-masc-anki">${word.gender}</span>
            </div>
          </div>

          <div class="field-sec">
            <span class="field-label" style="color:#fbbf24;">Usage Notes</span>
            ${usageNotesHtml}
          </div>

          <div class="field-sec">
            <span class="field-label" style="color:#86efac;">Related Words</span>
            ${relatedHtml}
          </div>

          <div class="field-sec">
            <span class="field-label" style="color:#fda4af;">Sound Alikes</span>
            ${soundAlikesHtml}
          </div>

          <div class="field-sec">
            <span class="field-label" style="color:#93c5fd;">Collocations</span>
            ${collocHtml}
          </div>

          <div class="field-sec">
            <span class="field-label" style="color:#c4b5fd;">Etymology</span>
            ${etymHtml}
          </div>
        </div>
      </div>
    </div>
  `;

  return `
<div class="anki-demo">
  <div>
    <p class="anki-panel-label">Front (Question)</p>
    ${frontHtml}
  </div>
  <div>
    <p class="anki-panel-label">Back (Answer)</p>
    ${backHtml}
  </div>
</div>
  `.trim();
};
